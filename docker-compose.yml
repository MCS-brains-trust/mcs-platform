version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcs_platform}
      POSTGRES_USER: ${POSTGRES_USER:-mcs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.docker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

  celery-worker:
    build: .
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=100
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    restart: on-failure

  celery-beat:
    build: .
    command: >
      celery -A config beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    restart: on-failure

volumes:
  postgres_data:
  media_data:
  redis_data:
