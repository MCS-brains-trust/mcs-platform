<script>
// ===== Enhanced Bank Statement Review — JavaScript =====
// Full spec: sorting, search, split, GST controls, creditable %,
// GST override, apportionment detection, entity GST settings, rule memory.

const CLASSIFY_URL = '{% url "core:review_classify_ai" pk=fy.pk %}';
const CLASSIFY_STATUS_URL = '{% url "core:review_classify_status" pk=fy.pk %}';
const BULK_APPROVE_URL = '{% url "core:review_bulk_approve_group" pk=fy.pk %}';
const COA_SEARCH_URL = '{% url "core:entity_coa_search_api" pk=fy.pk %}';
const DELETE_ALL_URL = '{% url "core:review_delete_all_transactions" pk=fy.pk %}';
const DELETE_SELECTED_URL = '{% url "core:review_delete_selected_transactions" pk=fy.pk %}';
const BULK_EDIT_URL = '{% url "core:review_bulk_edit_transactions" pk=fy.pk %}';
const APPROVE_SELECTED_URL = '{% url "core:review_approve_selected" pk=fy.pk %}';
const BANK_MAPPING_URL = '{% url "core:review_bank_account_mapping" pk=fy.pk %}';
const RECALC_BANK_CONTRA_URL = '{% url "core:recalculate_bank_contra_entries" pk=fy.pk %}';
const CSRF_TOKEN = '{{ csrf_token }}';

const FY_ID = '{{ fy.pk }}';
const IS_GST_REGISTERED = {{ entity_is_gst_registered|yesno:"true,false" }};

let isGroupView = false;
let undoTimer = null;
let undoBulkData = null;
let pendingRuleData = null;
let pendingEntityGstSettingData = null;
let currentSortCol = null;
let currentSortDir = 'asc';
let confirmedSortCol = null;
let confirmedSortDir = 'asc';

// ===== Column Sorting (Spec Section 6.2) =====
function sortPendingTable(column) {
    const tbody = document.getElementById('pendingTableBody');
    if (!tbody) return;

    // Toggle direction
    if (currentSortCol === column) {
        currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
    } else {
        currentSortCol = column;
        currentSortDir = 'asc';
    }

    // Update sort icons
    ['date', 'description', 'amount'].forEach(col => {
        const icon = document.getElementById('sort-icon-' + col);
        if (icon) {
            if (col === column) {
                icon.className = currentSortDir === 'asc'
                    ? 'bi bi-sort-down-alt text-primary'
                    : 'bi bi-sort-up text-primary';
                icon.style.fontSize = '0.75rem';
            } else {
                icon.className = 'bi bi-arrow-down-up text-muted';
                icon.style.fontSize = '0.7rem';
            }
        }
    });

    // Collect rows (review-row only, skip split/apportionment rows)
    const rows = Array.from(tbody.querySelectorAll('tr.review-row'));
    const associatedRows = {};

    // Map each review-row to its associated rows (apportionment + split editor)
    rows.forEach(row => {
        const txnId = row.id.replace('pending-row-', '');
        associatedRows[txnId] = [];
        const apportRow = document.getElementById('apportionment-row-' + txnId);
        const splitRow = document.getElementById('split-editor-' + txnId);
        if (apportRow) associatedRows[txnId].push(apportRow);
        if (splitRow) associatedRows[txnId].push(splitRow);
    });

    rows.sort((a, b) => {
        let valA, valB;
        if (column === 'date') {
            // Parse dd/mm/yyyy to comparable value
            valA = parseDateForSort(a.dataset.date);
            valB = parseDateForSort(b.dataset.date);
        } else if (column === 'description') {
            valA = (a.dataset.description || '').toLowerCase();
            valB = (b.dataset.description || '').toLowerCase();
        } else if (column === 'amount') {
            valA = parseFloat(a.dataset.amount || 0);
            valB = parseFloat(b.dataset.amount || 0);
        }
        let cmp = 0;
        if (valA < valB) cmp = -1;
        else if (valA > valB) cmp = 1;
        return currentSortDir === 'asc' ? cmp : -cmp;
    });

    // Re-append in sorted order with associated rows
    rows.forEach(row => {
        const txnId = row.id.replace('pending-row-', '');
        tbody.appendChild(row);
        (associatedRows[txnId] || []).forEach(assocRow => tbody.appendChild(assocRow));
    });
}

// ===== Confirmed Table Sorting =====
function sortConfirmedTable(column) {
    const tbody = document.getElementById('confirmedTableBody');
    if (!tbody) return;

    if (confirmedSortCol === column) {
        confirmedSortDir = confirmedSortDir === 'asc' ? 'desc' : 'asc';
    } else {
        confirmedSortCol = column;
        confirmedSortDir = 'asc';
    }

    ['date', 'description', 'amount', 'code', 'account'].forEach(col => {
        const icon = document.getElementById('confirmed-sort-icon-' + col);
        if (icon) {
            if (col === column) {
                icon.className = confirmedSortDir === 'asc'
                    ? 'bi bi-sort-down-alt text-primary'
                    : 'bi bi-sort-up text-primary';
                icon.style.fontSize = '0.75rem';
            } else {
                icon.className = 'bi bi-arrow-down-up text-muted';
                icon.style.fontSize = '0.7rem';
            }
        }
    });

    const rows = Array.from(tbody.querySelectorAll('tr'));
    rows.sort((a, b) => {
        let valA, valB;
        if (column === 'date') {
            valA = parseDateForSort(a.dataset.date);
            valB = parseDateForSort(b.dataset.date);
        } else if (column === 'description') {
            valA = (a.dataset.description || '').toLowerCase();
            valB = (b.dataset.description || '').toLowerCase();
        } else if (column === 'amount') {
            valA = parseFloat(a.dataset.amount || 0);
            valB = parseFloat(b.dataset.amount || 0);
        } else if (column === 'code') {
            valA = (a.dataset.code || '').toLowerCase();
            valB = (b.dataset.code || '').toLowerCase();
        } else if (column === 'account') {
            valA = (a.dataset.account || '').toLowerCase();
            valB = (b.dataset.account || '').toLowerCase();
        }
        let cmp = 0;
        if (valA < valB) cmp = -1;
        else if (valA > valB) cmp = 1;
        return confirmedSortDir === 'asc' ? cmp : -cmp;
    });

    rows.forEach(row => tbody.appendChild(row));
    applyConfirmedSearch();
}

// ===== Confirmed Table Search =====
function applyConfirmedSearch() {
    const query = (document.getElementById('confirmedSearchBox') || {}).value || '';
    const q = query.trim().toLowerCase();
    const tbody = document.getElementById('confirmedTableBody');
    if (!tbody) return;
    const rows = tbody.querySelectorAll('tr');
    let visible = 0;
    rows.forEach(row => {
        if (!q) {
            row.style.display = '';
            visible++;
        } else {
            const desc = (row.dataset.description || '').toLowerCase();
            const code = (row.dataset.code || '').toLowerCase();
            const account = (row.dataset.account || '').toLowerCase();
            const amount = row.dataset.amount || '';
            const date = (row.dataset.date || '').toLowerCase();
            if (desc.includes(q) || code.includes(q) || account.includes(q) || amount.includes(q) || date.includes(q)) {
                row.style.display = '';
                visible++;
            } else {
                row.style.display = 'none';
            }
        }
    });
    const countEl = document.getElementById('confirmedFilterCount');
    if (countEl) {
        countEl.textContent = q ? visible + ' of ' + rows.length : '';
    }
    const clearBtn = document.getElementById('confirmedSearchClearBtn');
    if (clearBtn) {
        clearBtn.classList.toggle('d-none', !q);
    }
}
function clearConfirmedSearch() {
    const box = document.getElementById('confirmedSearchBox');
    if (box) { box.value = ''; }
    applyConfirmedSearch();
}

function parseDateForSort(dateStr) {
    if (!dateStr) return 0;
    // Handle dd/mm/yyyy
    const parts = dateStr.split('/');
    if (parts.length === 3) {
        return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
    }
    // Handle yyyy-mm-dd
    const parts2 = dateStr.split('-');
    if (parts2.length === 3 && parts2[0].length === 4) {
        return new Date(parts2[0], parts2[1] - 1, parts2[2]).getTime();
    }
    return new Date(dateStr).getTime() || 0;
}

// ===== View Toggle (Pending / Confirmed) =====
function showReviewView(view) {
    const pendingSection = document.getElementById('pendingSection');
    const confirmedSection = document.getElementById('confirmedSection');
    const toolbar = document.getElementById('reviewToolbar');
    if (view === 'confirmed') {
        if (pendingSection) pendingSection.style.display = 'none';
        if (confirmedSection) confirmedSection.style.display = '';
        if (toolbar) toolbar.style.display = 'none';
    } else {
        if (pendingSection) pendingSection.style.display = '';
        if (confirmedSection) confirmedSection.style.display = 'none';
        if (toolbar) toolbar.style.display = '';
    }
}

// ===== Credits / Debits Type Filter =====
let activeTypeFilter = 'all';

function setTypeFilter(type) {
    activeTypeFilter = type;
    document.getElementById('btn-all-types').classList.toggle('active', type === 'all');
    document.getElementById('btn-credits').classList.toggle('active', type === 'credits');
    document.getElementById('btn-debits').classList.toggle('active', type === 'debits');
    applyEnhancedSearch();
}

// ===== Enhanced Search & Filter =====
function applyEnhancedSearch() {
    const query = (document.getElementById('reviewSearchBox')?.value || '').toLowerCase().trim();
    const statusFilter = document.getElementById('reviewStatusFilter')?.value || '';
    const gstFilter = document.getElementById('reviewGstFilter')?.value || '';
    const codeFilter = document.getElementById('aiClassFilter')?.value || '';
    const clearBtn = document.getElementById('searchClearBtn');
    if (clearBtn) clearBtn.classList.toggle('d-none', !query);

    let visibleCount = 0;
    let totalCount = 0;
    const rows = document.querySelectorAll('#pendingTableBody .review-row');

    // Parse amount queries
    let amountOp = null, amountVal = null;
    const amtMatch = query.match(/(?:over|above|>)\s*\$?([\d,.]+)/i);
    const amtMatchUnder = query.match(/(?:under|below|<)\s*\$?([\d,.]+)/i);
    if (amtMatch) { amountOp = 'over'; amountVal = parseFloat(amtMatch[1].replace(/,/g, '')); }
    else if (amtMatchUnder) { amountOp = 'under'; amountVal = parseFloat(amtMatchUnder[1].replace(/,/g, '')); }

    rows.forEach(row => {
        totalCount++;
        const desc = (row.dataset.description || '').toLowerCase();
        const amount = parseFloat(row.dataset.amount || 0);
        const absAmount = Math.abs(amount);
        const date = row.dataset.date || '';
        const code = row.dataset.code || '';
        const gst = row.dataset.gstTreatment || '';
        const status = row.dataset.status || '';
        const isSplit = row.dataset.isSplit === 'true';

        let show = true;

        // Text search (description, code, date)
        if (query && !amountOp) {
            if (!desc.includes(query) && !code.toLowerCase().includes(query) && !date.includes(query)) {
                show = false;
            }
        }
        // Amount filter
        if (amountOp === 'over' && absAmount <= amountVal) show = false;
        if (amountOp === 'under' && absAmount >= amountVal) show = false;

        // Status filter
        if (statusFilter) {
            if (statusFilter === 'split' && !isSplit) show = false;
            else if (statusFilter !== 'split' && status !== statusFilter) show = false;
        }
        // GST filter
        if (gstFilter && gst !== gstFilter) show = false;
        // Code filter
        if (codeFilter && code !== codeFilter) show = false;
        // Credits / Debits type filter
        if (activeTypeFilter === 'credits' && amount < 0) show = false;
        if (activeTypeFilter === 'debits' && amount >= 0) show = false;

        row.style.display = show ? '' : 'none';
        // Also hide/show associated rows
        const txnId = row.id.replace('pending-row-', '');
        const splitRow = document.getElementById('split-editor-' + txnId);
        const apportRow = document.getElementById('apportionment-row-' + txnId);
        if (splitRow && !show) splitRow.classList.add('d-none');
        if (apportRow && !show) apportRow.classList.add('d-none');

        if (show) visibleCount++;
    });

    const filterCount = document.getElementById('filterCount');
    if (filterCount) {
        if (query || statusFilter || gstFilter || codeFilter || activeTypeFilter !== 'all') {
            filterCount.textContent = visibleCount + ' of ' + totalCount;
        } else {
            filterCount.textContent = '';
        }
    }
}

function clearSearch() {
    const box = document.getElementById('reviewSearchBox');
    if (box) { box.value = ''; }
    applyEnhancedSearch();
}

// Populate account code filter dropdown
(function() {

// ===== Bulk Selection =====
function updateBulkSelection() {
    const checked = document.querySelectorAll('#pendingTableBody .row-select:checked');
    const bar = document.getElementById('bulkActionsBar');
    const count = document.getElementById('bulkSelectedCount');

// ===== GST Treatment Controls (AC-GST-01/05) =====
function updateGstTreatment(select) {
    const txnId = select.dataset.txnId;
    const treatment = select.value;
    const amount = Math.abs(parseFloat(select.dataset.amount || 0));
    const gstCell = document.getElementById('gst-amt-' + txnId);
    const netCell = document.getElementById('net-amt-' + txnId);
    const credPctCell = document.getElementById('cred-pct-cell-' + txnId);
    const row = document.getElementById('pending-row-' + txnId);

    let gstAmt = 0, netAmt = amount;
    if (treatment === 'gst') {
        const credPct = parseFloat(row?.dataset.creditablePct || 100);
        const fullGst = amount / 11;
        gstAmt = fullGst * credPct / 100;
        netAmt = amount - (amount / 11);
    }

    // Update GST display
    const gstDisplay = document.getElementById('gst-amt-display-' + txnId);
    if (gstDisplay) gstDisplay.textContent = '$' + gstAmt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    if (netCell) netCell.textContent = '$' + netAmt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    if (row) {
        row.dataset.gstTreatment = treatment;
        row.dataset.isGstManual = 'true';
    }

    // Show/hide creditable % display and Override link based on treatment
    if (credPctCell) {
        if (treatment === 'gst') {
            const credPctVal = row?.dataset.creditablePct || '100';
            const isOverridden = credPctVal !== '100';
            credPctCell.innerHTML = `<span class="creditable-pct-display${isOverridden ? ' fw-bold text-warning' : ''}" data-txn-id="${txnId}" id="cred-pct-display-${txnId}" style="font-size:0.8rem;">${credPctVal}%</span>`;
        } else {
            credPctCell.innerHTML = '<span class="text-muted" style="font-size:0.75rem;">&mdash;</span>';
        }
    }

    // Show/hide Override link in GST treatment cell
    const gstTreatmentCell = document.getElementById('gst-treatment-cell-' + txnId);
    if (gstTreatmentCell) {
        const existingOverrideLink = gstTreatmentCell.querySelector('.gst-override-link-wrapper');
        if (existingOverrideLink) existingOverrideLink.remove();
        if (treatment === 'gst') {
            const linkDiv = document.createElement('div');
            linkDiv.className = 'mt-1 gst-override-link-wrapper';
            linkDiv.innerHTML = '<a href="#" class="gst-override-link text-muted" style="font-size:0.65rem; text-decoration:none;" onclick="openGstOverride(event, \'' + txnId + '\')"><i class="bi bi-pencil" style="font-size:0.55rem;"></i> Override</a>';
            gstTreatmentCell.appendChild(linkDiv);
        }
    }

    // Add manual indicator (AC-GST-05)
    const gstTd = select.closest('td');
    let indicator = gstTd?.querySelector('.gst-manual-indicator');
    if (!indicator && gstTd) {
        const wrapper = gstTd.querySelector('.d-flex');
        if (wrapper) {
            const dot = document.createElement('span');
            dot.className = 'gst-manual-indicator';
            dot.title = 'Manually set';
            dot.style.cssText = 'color:#f59e0b; font-size:0.6rem;';
            dot.innerHTML = '&#9679;';
            wrapper.insertBefore(dot, wrapper.firstChild);
        }
    }
    select.style.borderColor = '#f59e0b';

    // Update hidden form fields
    const form = row?.querySelector('.review-approve-form');
    if (form) {
        const gstFlag = form.querySelector('.review-gst-flag');
        const gstAmtInput = form.querySelector('.review-gst-amount');
        if (gstFlag) gstFlag.value = treatment === 'gst' ? '1' : '0';
        if (gstAmtInput) gstAmtInput.value = gstAmt.toFixed(2);
    }

    // Persist to server
    fetch('/api/review/transaction/' + txnId + '/gst-treatment/', {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ gst_treatment: treatment, is_manual: true })
    }).catch(err => console.warn('GST update failed:', err));
}

// ===== GST Override (Cred.% + GST Amount + Reason) =====
// Opens the override editor row below the transaction
function openGstOverride(event, txnId) {
    event.preventDefault();
    const overrideRow = document.getElementById('gst-override-row-' + txnId);
    if (!overrideRow) return;
    // Toggle visibility
    if (!overrideRow.classList.contains('d-none')) {
        overrideRow.classList.add('d-none');
        return;
    }
    overrideRow.classList.remove('d-none');
    // Pre-populate GST amount from current calculated value
    const row = document.getElementById('pending-row-' + txnId);
    const amount = Math.abs(parseFloat(row?.dataset.amount || 0));
    const credPct = parseFloat(row?.dataset.creditablePct || 100);
    const fullGst = amount / 11;
    const currentGstAmt = (fullGst * credPct / 100).toFixed(2);
    const gstAmtInput = overrideRow.querySelector('.override-gst-amt-input');
    if (gstAmtInput && !gstAmtInput.value) gstAmtInput.value = currentGstAmt;
    // Focus the cred pct input
    const credInput = overrideRow.querySelector('.override-cred-pct-input');
    if (credInput) credInput.focus();
}

// When user changes Cred.%, auto-calculate the GST amount
function previewOverrideCalc(txnId) {
    const overrideRow = document.getElementById('gst-override-row-' + txnId);
    if (!overrideRow) return;
    const row = document.getElementById('pending-row-' + txnId);
    const amount = Math.abs(parseFloat(row?.dataset.amount || 0));
    const fullGst = amount / 11;
    const credInput = overrideRow.querySelector('.override-cred-pct-input');
    const gstAmtInput = overrideRow.querySelector('.override-gst-amt-input');
    const pct = parseFloat(credInput?.value || 100);
    const gstAmt = (fullGst * pct / 100).toFixed(2);
    if (gstAmtInput) gstAmtInput.value = gstAmt;
    const impliedEl = document.getElementById('override-implied-' + txnId);
    if (impliedEl) impliedEl.textContent = '';
}

// When user changes GST Amount directly, back-calculate the implied Cred.%
function previewOverrideFromGstAmt(txnId) {
    const overrideRow = document.getElementById('gst-override-row-' + txnId);
    if (!overrideRow) return;
    const row = document.getElementById('pending-row-' + txnId);
    const amount = Math.abs(parseFloat(row?.dataset.amount || 0));
    const fullGst = amount / 11;
    const gstAmtInput = overrideRow.querySelector('.override-gst-amt-input');
    const credInput = overrideRow.querySelector('.override-cred-pct-input');
    const gstAmt = parseFloat(gstAmtInput?.value || 0);
    const impliedPct = fullGst > 0 ? (gstAmt / fullGst * 100) : 0;
    if (credInput) credInput.value = impliedPct.toFixed(2);
    const impliedEl = document.getElementById('override-implied-' + txnId);
    if (impliedEl) impliedEl.textContent = 'Implied: ' + impliedPct.toFixed(2) + '%';
}

function saveGstOverride(txnId) {
    const overrideRow = document.getElementById('gst-override-row-' + txnId);
    if (!overrideRow) return;

    const credInput = overrideRow.querySelector('.override-cred-pct-input');
    const gstAmtInput = overrideRow.querySelector('.override-gst-amt-input');
    const reasonInput = overrideRow.querySelector('.override-reason-input');
    const pct = parseFloat(credInput?.value || 100);
    const overrideAmt = parseFloat(gstAmtInput?.value || 0);
    const reason = (reasonInput?.value || '').trim();

    if (!reason) {
        alert('A reason is mandatory for GST overrides.');
        reasonInput?.focus();
        return;
    }
    if (pct < 0 || pct > 100) {
        alert('Creditable percentage must be between 0 and 100.');
        credInput?.focus();
        return;
    }

    // Save creditable percentage first
    fetch('/api/review/transaction/' + txnId + '/creditable-pct/', {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ creditable_percentage: pct })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status !== 'ok') throw new Error(data.message || 'Failed to save creditable %');
        // Then save GST amount override
        return fetch('/api/review/transaction/' + txnId + '/gst-override/', {
            method: 'POST',
            headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({ gst_amount: overrideAmt, reason: reason })
        });
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            const row = document.getElementById('pending-row-' + txnId);
            if (row) {
                row.dataset.creditablePct = pct;
                row.dataset.hasGstOverride = 'true';
            }

            // Update the read-only Cred.% display
            const credDisplay = document.getElementById('cred-pct-display-' + txnId);
            if (credDisplay) {
                credDisplay.textContent = pct + '%';
                if (pct !== 100) {
                    credDisplay.className = 'creditable-pct-display fw-bold text-warning';
                } else {
                    credDisplay.className = 'creditable-pct-display';
                }
            }
            // Add "Overridden" badge below cred display
            const credCell = document.getElementById('cred-pct-cell-' + txnId);
            if (credCell) {
                const existingBadge = credCell.querySelector('.badge');
                if (existingBadge) existingBadge.remove();
                const badge = document.createElement('span');
                badge.className = 'badge bg-warning text-dark d-block mt-1';
                badge.style.fontSize = '0.55rem';
                badge.title = 'Reason: ' + reason;
                badge.innerHTML = '<i class="bi bi-pencil-fill"></i> Overridden';
                credCell.appendChild(badge);
            }

            // Update GST amount display
            const gstDisplay = document.getElementById('gst-amt-display-' + txnId);
            if (gstDisplay) {
                gstDisplay.innerHTML = '$' + parseFloat(data.gst_amount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',') +
                    ' <i class="bi bi-pencil-fill text-warning" style="font-size:0.6rem;" title="Overridden"></i>';
            }
            const netCell = document.getElementById('net-amt-' + txnId);
            if (netCell) netCell.textContent = '$' + parseFloat(data.net_amount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

            // Update Override link text
            const gstTreatmentCell = document.getElementById('gst-treatment-cell-' + txnId);
            const overrideLink = gstTreatmentCell?.querySelector('.gst-override-link');
            if (overrideLink) overrideLink.innerHTML = '<i class="bi bi-pencil-fill text-warning" style="font-size:0.55rem;"></i> Edit override';

            // Update hidden form fields
            const form = row?.querySelector('.review-approve-form');
            if (form) {
                const gstAmtHidden = form.querySelector('.review-gst-amount');
                const credPctHidden = form.querySelector('.review-cred-pct');
                if (gstAmtHidden) gstAmtHidden.value = data.gst_amount;
                if (credPctHidden) credPctHidden.value = pct;
            }

            overrideRow.classList.add('d-none');
            showReviewNotification('GST override saved: ' + pct + '% creditable, reason: ' + reason);

            // Prompt entity setting save for vehicle/entertainment
            const apportType = row?.dataset.apportionmentType;
            if (pct !== 100 && (apportType === 'vehicle' || apportType === 'entertainment' || apportType === 'phone_business_use')) {
                promptSaveEntityGstSetting(txnId, apportType, pct);
            }
        } else {
            alert('Error: ' + (data.message || 'Unknown error'));
        }
    })
    .catch(err => alert('Error: ' + err));
}

function cancelGstOverride(txnId) {
    const overrideRow = document.getElementById('gst-override-row-' + txnId);
    if (overrideRow) overrideRow.classList.add('d-none');
}

// ===== Bulk GST (AC-GST-02/03/04) =====
function applyBulkGst() {
    const treatment = document.getElementById('bulkGstSelect')?.value;
    if (!treatment) return;
    const checked = document.querySelectorAll('#pendingTableBody .row-select:checked');
    if (checked.length === 0) return;

    // Store undo data before changing
    const undoItems = [];
    const txnIds = [];
    checked.forEach(cb => {
        const row = cb.closest('tr');
        const select = row?.querySelector('.gst-treatment-select');
        if (select) {
            undoItems.push({
                id: cb.value,
                gst_treatment: select.value,
                creditable_pct: row?.dataset.creditablePct || '100',
                is_gst_manual: row?.dataset.isGstManual || 'false'
            });
            txnIds.push(cb.value);
            select.value = treatment;
            updateGstTreatment(select);
        }
    });

    undoBulkData = { items: undoItems, treatment: treatment };
    showUndoToast('GST changed to ' + treatment.replace(/_/g, ' ') + ' for ' + txnIds.length + ' transactions.');
}

function showUndoToast(message) {
    const toast = document.getElementById('undoToast');
    const text = document.getElementById('undoToastText');
    const countdown = document.getElementById('undoCountdown');
    if (!toast) return;
    if (text) text.textContent = message;
    toast.classList.remove('d-none');
    let seconds = 5;
    if (countdown) countdown.textContent = seconds + 's';
    if (undoTimer) clearInterval(undoTimer);
    undoTimer = setInterval(() => {
        seconds--;
        if (countdown) countdown.textContent = seconds + 's';
        if (seconds <= 0) {
            clearInterval(undoTimer);
            toast.classList.add('d-none');
            undoBulkData = null;
        }
    }, 1000);
}

function undoBulkGst() {
    if (!undoBulkData) return;
    undoBulkData.items.forEach(item => {
        const row = document.getElementById('pending-row-' + item.id);
        const select = row?.querySelector('.gst-treatment-select');
        if (select) {
            select.value = item.gst_treatment;
            updateGstTreatment(select);
        }
    });
    const toast = document.getElementById('undoToast');
    if (toast) toast.classList.add('d-none');
    if (undoTimer) clearInterval(undoTimer);
    undoBulkData = null;
}

// ===== Bulk Approve Selected =====
function bulkApproveSelected() {
    const checked = document.querySelectorAll('#pendingTableBody .row-select:checked');
    if (checked.length === 0) return;

    // Check for unconfirmed apportionment
    let hasUnconfirmedApport = false;
    checked.forEach(cb => {
        const row = document.getElementById('pending-row-' + cb.value);
        if (row?.dataset.apportionmentType && row?.dataset.creditablePct === '100' &&
            (row?.dataset.apportionmentType === 'vehicle' || row?.dataset.apportionmentType === 'entertainment')) {
            hasUnconfirmedApport = true;
        }
    });
    if (hasUnconfirmedApport) {
        if (!confirm('Some transactions have unconfirmed business use percentages. Approve anyway?')) return;
    }

    if (!confirm('Approve ' + checked.length + ' selected transactions and push to Trial Balance?')) return;

    // Collect per-transaction form data for the batch request
    const transactions = [];
    checked.forEach(cb => {
        const txnId = cb.value;
        const row = document.getElementById('pending-row-' + txnId);
        const form = row?.querySelector('.review-approve-form');
        if (form) {
            transactions.push({
                id: txnId,
                confirmed_code: form.querySelector('.review-code-input')?.value || '',
                confirmed_name: form.querySelector('.review-name-input')?.value || '',
                confirmed_tax_type: form.querySelector('.review-tax-input')?.value || '',
                has_gst: form.querySelector('.review-gst-flag')?.value || '0',
                gst_amount: form.querySelector('.review-gst-amount')?.value || '0.00',
                creditable_percentage: form.querySelector('.review-cred-pct')?.value || '100',
            });
        }
    });

    if (transactions.length === 0) return;

    // Disable the approve button and show spinner
    const approveBtn = document.querySelector('[onclick="bulkApproveSelected()"]');
    const originalBtnHtml = approveBtn ? approveBtn.innerHTML : '';
    if (approveBtn) {
        approveBtn.disabled = true;
        approveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Approving...';
    }

    fetch(APPROVE_SELECTED_URL, {
        method: 'POST',
        headers: {
            'X-CSRFToken': CSRF_TOKEN,
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ transactions: transactions })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            // Remove approved rows from the pending table
            (data.approved_ids || []).forEach(id => {
                const row = document.getElementById('pending-row-' + id);
                const overrideRow = document.getElementById('gst-override-row-' + id);
                const apportRow = document.getElementById('apportionment-row-' + id);
                const splitEditor = document.getElementById('split-editor-' + id);
                if (row) { row.style.transition = 'opacity 0.3s'; row.style.opacity = '0'; setTimeout(() => row.remove(), 300); }
                if (overrideRow) overrideRow.remove();
                if (apportRow) apportRow.remove();
                if (splitEditor) splitEditor.remove();
            });

            // Update badges
            const pendingBadge = document.getElementById('pendingBadge');
            const confirmedBadge = document.getElementById('confirmedBadge');
            if (pendingBadge && data.remaining_pending !== undefined) pendingBadge.textContent = data.remaining_pending + ' pending';
            if (confirmedBadge && data.remaining_confirmed !== undefined) confirmedBadge.textContent = data.remaining_confirmed + ' confirmed';

            // Hide bulk toolbar
            const bar = document.getElementById('bulkActionsBar');
            if (bar) bar.classList.add('d-none');

            showReviewNotification(data.message || 'Approved ' + data.approved_count + ' transactions.');
            // Reload after a short delay to refresh the confirmed table and TB
            setTimeout(() => location.reload(), 1500);
        } else {
            alert('Error: ' + (data.message || 'Could not approve transactions'));
            if (approveBtn) { approveBtn.disabled = false; approveBtn.innerHTML = originalBtnHtml; }
        }
    })
    .catch(err => {
        console.error('Bulk approve error:', err);
        alert('Network error while approving transactions. Please try again.');
        if (approveBtn) { approveBtn.disabled = false; approveBtn.innerHTML = originalBtnHtml; }
    });
}

// ===== Apportionment Detection (AC-APT-03/04/05/06) =====
function detectApportionmentForRow(txnId) {
    fetch('/api/review/transaction/' + txnId + '/detect-apportionment/', {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/json' },
        body: '{}'
    })
    .then(r => r.json())
    .then(data => {
        if (data.status !== 'ok') return;
        if (!data.apportionment_type) return;

        const row = document.getElementById('pending-row-' + txnId);
        if (row) {
            row.dataset.apportionmentType = data.apportionment_type;
            row.dataset.apportionmentReason = data.reason;
        }

        // Show apportionment reason row
        const apportRow = document.getElementById('apportionment-row-' + txnId);
        const reasonEl = document.getElementById('apportionment-reason-' + txnId);
        const actionEl = document.getElementById('apportionment-action-' + txnId);
        if (apportRow && reasonEl) {
            apportRow.classList.remove('d-none');
            reasonEl.textContent = data.reason;

            // Set creditable percentage display if AI suggests it
            if (data.creditable_percentage && data.creditable_percentage !== '100') {
                if (row) row.dataset.creditablePct = data.creditable_percentage;
                const credDisplay = document.getElementById('cred-pct-display-' + txnId);
                if (credDisplay) {
                    credDisplay.textContent = data.creditable_percentage + '%';
                    credDisplay.className = 'creditable-pct-display fw-bold text-warning';
                }
                // Also update the override row's cred pct input default
                const overrideRow = document.getElementById('gst-override-row-' + txnId);
                const overrideCredInput = overrideRow?.querySelector('.override-cred-pct-input');
                if (overrideCredInput) overrideCredInput.value = data.creditable_percentage;
                // Update GST amount display
                const amount = Math.abs(parseFloat(row?.dataset.amount || 0));
                const fullGst = amount / 11;
                const gstAmt = fullGst * parseFloat(data.creditable_percentage) / 100;
                const gstDisplay = document.getElementById('gst-amt-display-' + txnId);
                if (gstDisplay) gstDisplay.textContent = '$' + gstAmt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                // Update hidden form fields
                const form = row?.querySelector('.review-approve-form');
                if (form) {
                    const gstAmtHidden = form.querySelector('.review-gst-amount');
                    const credPctHidden = form.querySelector('.review-cred-pct');
                    if (gstAmtHidden) gstAmtHidden.value = gstAmt.toFixed(2);
                    if (credPctHidden) credPctHidden.value = data.creditable_percentage;
                }
                // Persist to server
                fetch('/api/review/transaction/' + txnId + '/creditable-pct/', {
                    method: 'POST',
                    headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ creditable_percentage: parseFloat(data.creditable_percentage) })
                }).catch(err => console.warn('Auto cred % save failed:', err));
            }

            // Show confirmation prompt for vehicle/entertainment (AC-APT-04)
            if (data.requires_confirmation && actionEl) {
                actionEl.innerHTML = '<button class="btn btn-sm btn-outline-primary py-0 px-2" style="font-size:0.75rem;" ' +
                    'onclick="promptBusinessUsePct(\'' + txnId + '\', \'' + data.apportionment_type + '\')">Confirm business use %</button>';
            }
        }
    })
    .catch(err => console.warn('Apportionment detection failed for ' + txnId + ':', err));
}

function promptBusinessUsePct(txnId, apportType) {
    const pct = prompt('Enter business use percentage (0-100):');
    if (pct === null) return;
    const pctNum = parseFloat(pct);
    if (isNaN(pctNum) || pctNum < 0 || pctNum > 100) {
        alert('Please enter a valid percentage between 0 and 100.');
        return;
    }
    // Open the override row with the confirmed percentage pre-filled
    const overrideRow = document.getElementById('gst-override-row-' + txnId);
    if (overrideRow) {
        overrideRow.classList.remove('d-none');
        const credInput = overrideRow.querySelector('.override-cred-pct-input');
        if (credInput) credInput.value = pctNum;
        previewOverrideCalc(txnId);
        const reasonInput = overrideRow.querySelector('.override-reason-input');
        if (reasonInput && !reasonInput.value) {
            const typeLabels = { 'vehicle': 'Vehicle business use', 'entertainment': 'Entertainment FBT', 'phone_business_use': 'Phone business use' };
            reasonInput.value = (typeLabels[apportType] || 'Business use') + ' ' + pctNum + '%';
        }
    }
    // Update the apportionment action to show confirmed
    const actionEl = document.getElementById('apportionment-action-' + txnId);
    if (actionEl) actionEl.innerHTML = '<span class="badge bg-info" style="font-size:0.7rem;">Review override below</span>';
}

// Run apportionment detection on page load for all pending rows
if (IS_GST_REGISTERED) {
    document.querySelectorAll('#pendingTableBody .review-row').forEach(row => {
        const txnId = row.id.replace('pending-row-', '');
        if (txnId) detectApportionmentForRow(txnId);
    });
}

// ===== Split Transaction Editor =====
let splitLineCounters = {};

function openSplitEditor(txnId, amount, code, name) {
    const editor = document.getElementById('split-editor-' + txnId);
    if (!editor) return;
    editor.classList.remove('d-none');
    splitLineCounters[txnId] = 0;
    const container = document.getElementById('split-lines-' + txnId);
    container.innerHTML = '';
    addSplitLine(txnId, Math.abs(amount), code, name);
    addSplitLine(txnId, 0, '', '');
}

function addSplitLine(txnId, amount, code, name) {
    if (!splitLineCounters[txnId] && splitLineCounters[txnId] !== 0) splitLineCounters[txnId] = 0;
    splitLineCounters[txnId]++;
    const lineNum = splitLineCounters[txnId];
    const container = document.getElementById('split-lines-' + txnId);
    if (!container) return;
    if (lineNum > 5) { alert('Maximum 5 split lines.'); return; }

    const lineHtml = `
    <div class="row g-2 align-items-center mb-1 split-line" id="split-line-${txnId}-${lineNum}" data-txn-id="${txnId}">
        <div class="col-auto"><span class="badge bg-secondary">${lineNum}</span></div>
        <div class="col-md-4">
            <div class="input-group input-group-sm">
                <input type="text" class="form-control split-account-search" placeholder="Search account..."
                       data-txn-id="${txnId}" data-line="${lineNum}" value="${name ? code + ' — ' + name : ''}"
                       oninput="searchSplitAccount(this)">
                <input type="hidden" class="split-account-code" value="${code}">
                <input type="hidden" class="split-account-name" value="${name}">
            </div>
            <div class="split-account-results position-absolute bg-white border shadow-sm d-none" style="z-index:1050; max-height:200px; overflow-y:auto; width:350px;"></div>
        </div>
        <div class="col-md-2">
            <input type="number" class="form-control form-control-sm split-amount" step="0.01"
                   value="${amount || ''}" placeholder="Amount" data-txn-id="${txnId}"
                   oninput="updateSplitTotals('${txnId}')">
        </div>
        <div class="col-md-2">
            <select class="form-select form-select-sm split-gst">
                <option value="gst">GST 10%</option>
                <option value="gst_free">GST-Free</option>
                <option value="input_taxed">Input Taxed</option>
                <option value="out_of_scope">Out of Scope</option>
            </select>
        </div>
        <div class="col-md-1">
            <input type="number" class="form-control form-control-sm split-cred-pct text-end" value="100" min="0" max="100" step="0.01" title="Creditable %">
        </div>
        <div class="col-auto">
            ${lineNum > 1 ? `<button class="btn btn-sm btn-outline-danger py-0" onclick="removeSplitLine('${txnId}', ${lineNum})"><i class="bi bi-x"></i></button>` : ''}
        </div>
    </div>`;
    container.insertAdjacentHTML('beforeend', lineHtml);
    updateSplitTotals(txnId);
}

function removeSplitLine(txnId, lineNum) {
    const line = document.getElementById('split-line-' + txnId + '-' + lineNum);
    if (line) line.remove();
    updateSplitTotals(txnId);
}

function updateSplitTotals(txnId) {
    const container = document.getElementById('split-lines-' + txnId);
    if (!container) return;
    const row = document.getElementById('pending-row-' + txnId);
    const originalAmount = Math.abs(parseFloat(row?.dataset.amount || 0));
    let allocated = 0;
    container.querySelectorAll('.split-amount').forEach(input => {
        allocated += parseFloat(input.value || 0);
    });
    const allocatedEl = document.getElementById('split-allocated-' + txnId);
    const residualEl = document.getElementById('split-residual-' + txnId);
    if (allocatedEl) allocatedEl.textContent = '$' + allocated.toFixed(2);
    const residual = originalAmount - allocated;
    if (residualEl) {
        if (Math.abs(residual) > 0.01) {
            residualEl.textContent = 'Residual: $' + residual.toFixed(2);
            residualEl.classList.add('text-warning');
            residualEl.classList.remove('text-success');
        } else {
            residualEl.textContent = 'Balanced \u2713';
            residualEl.classList.remove('text-warning');
            residualEl.classList.add('text-success');
        }
    }
}

function searchSplitAccount(input) {
    const query = input.value.trim();
    const resultsDiv = input.closest('.col-md-4').querySelector('.split-account-results');
    if (!resultsDiv) return;
    if (query.length < 1) { resultsDiv.classList.add('d-none'); return; }

    fetch(COA_SEARCH_URL + '?q=' + encodeURIComponent(query))
    .then(r => r.json())
    .then(data => {
        if (data.items.length === 0) {
            resultsDiv.innerHTML = '<div class="p-2 text-muted small">No results</div>';
        } else {
            // Sort: accounts with TB balances first, then by absolute balance descending
            const sorted = data.items.slice().sort((a, b) => {
                const aHas = a.tb_balance !== null && a.tb_balance !== undefined ? 1 : 0;
                const bHas = b.tb_balance !== null && b.tb_balance !== undefined ? 1 : 0;
                if (aHas !== bHas) return bHas - aHas;
                if (aHas && bHas) return Math.abs(parseFloat(b.tb_balance)) - Math.abs(parseFloat(a.tb_balance));
                return 0;
            });
            resultsDiv.innerHTML = sorted.slice(0, 8).map(item => {
                const tbBal = item.tb_balance !== null && item.tb_balance !== undefined
                    ? `<span class="badge bg-secondary bg-opacity-25 text-dark ms-1" style="font-size:0.65rem; font-weight:600; font-family:monospace;">TB: $${parseFloat(item.tb_balance).toLocaleString('en-AU', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>`
                    : `<span class="badge bg-light text-muted ms-1" style="font-size:0.65rem;">TB: \u2014</span>`;
                const stmtType = item.stmt_type ? ` <span class="text-muted" style="font-size:0.65rem;">(${item.stmt_type})</span>` : '';
                return `<a href="#" class="dropdown-item small py-1 split-coa-option"
                    data-code="${item.code}" data-name="${item.name}">
                    <strong>${item.code}</strong> \u2014 ${item.name}${stmtType}
                    ${tbBal}
                </a>`;
            }).join('');
        }
        resultsDiv.classList.remove('d-none');
        resultsDiv.querySelectorAll('.split-coa-option').forEach(opt => {
            opt.addEventListener('click', function(e) {
                e.preventDefault();
                const code = this.dataset.code;
                const name = this.dataset.name;
                input.value = code + ' — ' + name;
                input.closest('.col-md-4').querySelector('.split-account-code').value = code;
                input.closest('.col-md-4').querySelector('.split-account-name').value = name;
                resultsDiv.classList.add('d-none');
            });
        });
    });
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.split-account-search') && !e.target.closest('.split-account-results')) {
        document.querySelectorAll('.split-account-results').forEach(d => d.classList.add('d-none'));
    }
});

function confirmSplit(txnId) {
    const container = document.getElementById('split-lines-' + txnId);
    const row = document.getElementById('pending-row-' + txnId);
    if (!container || !row) return;
    const originalAmount = Math.abs(parseFloat(row.dataset.amount || 0));

    const lines = [];
    let total = 0;
    container.querySelectorAll('.split-line').forEach(line => {
        const code = line.querySelector('.split-account-code')?.value || '';
        const name = line.querySelector('.split-account-name')?.value || '';
        const amount = parseFloat(line.querySelector('.split-amount')?.value || 0);
        const gst = line.querySelector('.split-gst')?.value || 'gst';
        const credPct = parseFloat(line.querySelector('.split-cred-pct')?.value || 100);
        if (amount > 0) {
            lines.push({ account_code: code, account_name: name, amount: amount, gst_treatment: gst, creditable_percentage: credPct });
            total += amount;
        }
    });

    if (Math.abs(originalAmount - total) > 0.01) {
        alert('Split amounts must equal the original amount ($' + originalAmount.toFixed(2) + '). Current total: $' + total.toFixed(2));
        return;
    }
    if (lines.length < 2) {
        alert('A split must have at least 2 lines.');
        return;
    }

    fetch('/api/review/transaction/' + txnId + '/split/', {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ lines: lines })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            location.reload();
        } else {
            alert('Error: ' + (data.message || 'Unknown error'));
        }
    })
    .catch(err => alert('Network error: ' + err));
}

function cancelSplit(txnId) {
    const editor = document.getElementById('split-editor-' + txnId);
    if (editor) editor.classList.add('d-none');
}

function confirmSaveRule() {

// ===== Helper: Add a row to the confirmed table =====
function _addRowToConfirmedTable(data) {
    const confirmedBody = document.getElementById('confirmedTableBody');
    if (!confirmedBody) return;
    const emptyMsg = document.getElementById('confirmedEmptyMsg');
    if (emptyMsg) emptyMsg.style.display = 'none';
    const amt = parseFloat(data.amount);
    const absAmt = Math.abs(amt);
    const amtClass = amt < 0 ? 'text-danger' : 'text-success';
    const amtFormatted = '$' + absAmt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    const hasGst = data.has_gst;
    const credPct = data.creditable_percentage || 100;
    const gstAmt = hasGst ? (absAmt / 11 * credPct / 100).toFixed(2) : '0.00';
    const netAmt = hasGst ? (absAmt - (absAmt / 11)).toFixed(2) : absAmt.toFixed(2);
    const gstBadge = hasGst
        ? '<span class="badge bg-success"><i class="bi bi-check-lg"></i></span>'
        : '<span class="badge bg-secondary"><i class="bi bi-x-lg"></i></span>';
    const credPctDisplay = hasGst ? (credPct != 100 ? '<span class="fw-bold text-warning">' + credPct + '%</span>' : '100%') : '&mdash;';
    const row = `<tr id="confirmed-row-${data.id}">
        <td><input type="checkbox" class="confirmed-checkbox" value="${data.id}" onclick="updateConfirmedSelection()"></td>
        <td>${data.date}</td>
        <td>${data.description}</td>
        <td class="text-end ${amtClass}">${amtFormatted}</td>
        <td class="text-center">${gstBadge}</td>
        <td class="text-end">${credPctDisplay}</td>
        <td class="text-end">$${gstAmt}</td>
        <td class="text-end">$${netAmt}</td>
        <td><code>${data.confirmed_code}</code></td>
        <td>${data.confirmed_name}</td>
        <td><small>${data.confirmed_tax_type || '-'}</small></td>
        <td><button class="btn btn-sm btn-outline-warning py-0 px-1 txn-unconfirm-btn" data-txn-id="${data.id}" data-unconfirm-url="${data.unconfirm_url}"><i class="bi bi-arrow-counterclockwise"></i></button></td>
    </tr>`;
    confirmedBody.insertAdjacentHTML('afterbegin', row);
}

// ===== Approve All & Push to TB =====
function approveAllAndPush() {
    const btn = document.getElementById('approveAllPushBtn');
    if (!btn) return;
    const url = btn.dataset.url;
    if (!url) return;
    if (!confirm('This will approve ALL pending transactions and push them to the Trial Balance. Continue?')) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Processing...';

    fetch(url, {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN }
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            showReviewNotification(data.message || 'All transactions approved and pushed to TB.');
            setTimeout(() => location.reload(), 1500);
        } else {
            alert('Error: ' + (data.message || 'Unknown error'));
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-all"></i> Approve All & Push to TB';
        }
    })
    .catch(err => {
        alert('Network error.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-all"></i> Approve All & Push to TB';
    });
}

// ===== Delete Transactions =====
function deleteSingleTransaction(txnId) {
    if (!confirm('Delete this transaction? This cannot be undone.')) return;

    const url = '{% url "core:review_delete_transaction" pk=fy.pk txn_pk="00000000-0000-0000-0000-000000000000" %}'.replace('00000000-0000-0000-0000-000000000000', txnId);

    fetch(url, {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN }
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            // Remove from pending table
            const pendingRow = document.getElementById('pending-row-' + txnId);
            const overrideRow = document.getElementById('gst-override-row-' + txnId);
            const apportRow = document.getElementById('apportionment-row-' + txnId);
            const splitEditor = document.getElementById('split-editor-' + txnId);
            if (pendingRow) { pendingRow.style.transition = 'opacity 0.3s'; pendingRow.style.opacity = '0'; setTimeout(() => pendingRow.remove(), 300); }
            if (overrideRow) overrideRow.remove();
            if (apportRow) apportRow.remove();
            if (splitEditor) splitEditor.remove();

            // Remove from confirmed table
            const confirmedRow = document.getElementById('confirmed-row-' + txnId);
            if (confirmedRow) { confirmedRow.style.transition = 'opacity 0.3s'; confirmedRow.style.opacity = '0'; setTimeout(() => confirmedRow.remove(), 300); }

            // Update badges
            const pendingBadge = document.getElementById('pendingBadge');
            const confirmedBadge = document.getElementById('confirmedBadge');
            if (pendingBadge && data.remaining_pending !== undefined) pendingBadge.textContent = data.remaining_pending + ' pending';
            if (confirmedBadge && data.remaining_confirmed !== undefined) confirmedBadge.textContent = data.remaining_confirmed + ' confirmed';

            showReviewNotification(data.message || 'Transaction deleted.');
        } else {
            alert('Error: ' + (data.message || 'Could not delete transaction'));
        }
    })
    .catch(err => alert('Network error while deleting transaction.'));
}

// ===== Bulk Edit (Assign Account to Selected) =====
let bulkEditSearchTimer = null;

document.addEventListener('input', function(e) {
    if (e.target.id !== 'bulkEditCoaSearch') return;
    const query = e.target.value.trim();
    const resultsDiv = document.getElementById('bulkEditCoaResults');
    if (bulkEditSearchTimer) clearTimeout(bulkEditSearchTimer);
    if (query.length < 1) {
        if (resultsDiv) resultsDiv.innerHTML = '<div class="text-center text-muted py-2"><small>Type to search...</small></div>';
        return;
    }
    bulkEditSearchTimer = setTimeout(function() {
        fetch(COA_SEARCH_URL + '?q=' + encodeURIComponent(query))
        .then(r => r.json())
        .then(data => {
            let html = '';
            if (data.items.length === 0) {
                html = '<div class="text-center text-muted py-2"><small>No matching accounts.</small></div>';
            } else {
                // Sort: accounts with TB balances first, then by absolute balance descending
                var sorted = data.items.slice().sort(function(a, b) {
                    var aHas = a.tb_balance !== null && a.tb_balance !== undefined ? 1 : 0;
                    var bHas = b.tb_balance !== null && b.tb_balance !== undefined ? 1 : 0;
                    if (aHas !== bHas) return bHas - aHas;
                    if (aHas && bHas) return Math.abs(parseFloat(b.tb_balance)) - Math.abs(parseFloat(a.tb_balance));
                    return 0;
                });
                html = sorted.slice(0, 10).map(item => {
                    const tbBal = item.tb_balance !== null && item.tb_balance !== undefined
                        ? ' <span class="badge bg-secondary bg-opacity-25 text-dark" style="font-size:0.65rem; font-weight:600; font-family:monospace;">TB: $' + parseFloat(item.tb_balance).toLocaleString('en-AU', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</span>'
                        : ' <span class="badge bg-light text-muted" style="font-size:0.65rem;">TB: \u2014</span>';
                    const stmtType = item.stmt_type ? ' <span class="text-muted" style="font-size:0.65rem;">(' + item.stmt_type + ')</span>' : '';
                    return '<a href="#" class="dropdown-item small py-1 bulk-edit-coa-option" ' +
                    'data-code="' + item.code + '" ' +
                    'data-name="' + item.name + '" ' +
                    'data-tax="' + (item.tax_code || '') + '">' +
                    '<strong>' + item.code + '</strong> \u2014 ' + item.name + stmtType +
                    tbBal +
                    '</a>';
                }).join('');
            }
            if (resultsDiv) resultsDiv.innerHTML = html;
        });
    }, 200);
});

function _getBulkEditSelection() {
    const code = document.getElementById('bulkEditAccountCode').value;
    const name = document.getElementById('bulkEditAccountName').value;
    const tax = document.getElementById('bulkEditAccountTax').value;
    const checked = document.querySelectorAll('#pendingTableBody .row-select:checked');
    const txnIds = Array.from(checked).map(cb => cb.value);
    return { code, name, tax, txnIds };
}

function bulkEditAssign() {
    const { code, name, tax, txnIds } = _getBulkEditSelection();
    if (!code || txnIds.length === 0) { alert('Select an account and at least one transaction.'); return; }

    fetch(BULK_EDIT_URL, {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ transaction_ids: txnIds, account_code: code, account_name: name, tax_code: tax, approve: false })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            // Update each row in the pending table
            txnIds.forEach(id => {
                const row = document.getElementById('pending-row-' + id);
                if (row) {
                    row.dataset.code = code;
                    const codeEl = row.querySelector('.review-ai-code');
                    if (codeEl) codeEl.textContent = code;
                    const btn = row.querySelector('.review-coa-btn');
                    if (btn) btn.textContent = name;
                    // Update hidden form fields
                    const form = row.querySelector('.review-approve-form');
                    if (form) {
                        const ci = form.querySelector('.review-code-input'); if (ci) ci.value = code;
                        const ni = form.querySelector('.review-name-input'); if (ni) ni.value = name;
                        const ti = form.querySelector('.review-tax-input'); if (ti) ti.value = tax;
                    }
                    // Auto-set GST treatment based on the account's tax code
                    if (IS_GST_REGISTERED && tax) _applyGstTreatmentForAccount(id, tax);
                }
            });
            // Close dropdown
            const dd = bootstrap.Dropdown.getInstance(document.getElementById('bulkEditBtn'));
            if (dd) dd.hide();
            _resetBulkEditPanel();
            showReviewNotification(data.message || 'Account assigned to ' + txnIds.length + ' transactions.');
        } else {
            alert('Error: ' + (data.message || 'Could not assign account'));
        }
    })
    .catch(err => alert('Network error during bulk edit.'));
}

function bulkEditAssignAndApprove() {
    const { code, name, tax, txnIds } = _getBulkEditSelection();
    if (!code || txnIds.length === 0) { alert('Select an account and at least one transaction.'); return; }
    if (!confirm('Assign account ' + code + ' and approve ' + txnIds.length + ' transactions? This will push them to the Trial Balance.')) return;

    fetch(BULK_EDIT_URL, {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ transaction_ids: txnIds, account_code: code, account_name: name, tax_code: tax, approve: true })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            // Close dropdown
            const dd = bootstrap.Dropdown.getInstance(document.getElementById('bulkEditBtn'));
            if (dd) dd.hide();
            _resetBulkEditPanel();
            showReviewNotification(data.message || 'Assigned and approved ' + txnIds.length + ' transactions.');
            setTimeout(() => location.reload(), 1500);
        } else {
            alert('Error: ' + (data.message || 'Could not assign and approve'));
        }
    })

}

// ===== AI Classification =====
function startAiClassification() {
    const btn = document.getElementById('classifyAiBtn');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Starting...';

    fetch(CLASSIFY_URL, {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF_TOKEN }
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok' || data.status === 'started' || data.status === 'running') {
            const progress = document.getElementById('classifyProgress');
            if (progress) progress.classList.remove('d-none');
            startClassifyPolling();
        } else if (data.status === 'complete') {
            showReviewNotification(data.message || 'All transactions already classified.');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-robot"></i> Classify with AI';
        } else {
            alert('Error: ' + (data.message || 'Could not start classification'));
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-robot"></i> Classify with AI';
        }
    })
    .catch(err => {
        alert('Network error.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-robot"></i> Classify with AI';
    });
}

function startClassifyPolling() {
    setTimeout(pollClassifyStatus, 3000);
}

function pollClassifyStatus() {
    fetch(CLASSIFY_STATUS_URL)
    .then(r => r.json())
    .then(data => {
        if (data.status === 'running' || data.status === 'started') {
            updateClassifyProgress(data);
            setTimeout(pollClassifyStatus, 3000);
        } else if (data.status === 'complete' || data.status === 'done') {
            showClassifyComplete(data);
        } else {
            const btn = document.getElementById('classifyAiBtn');
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-robot"></i> Classify with AI'; }
            const progress = document.getElementById('classifyProgress');
            if (progress) progress.classList.add('d-none');
        }
    })
    .catch(err => setTimeout(pollClassifyStatus, 5000));
}

function updateClassifyProgress(data) {
    const bar = document.getElementById('classifyProgressBar');
    const text = document.getElementById('classifyProgressText');
    const pct = data.progress || 0;
    if (bar) bar.style.width = pct + '%';
    if (text) text.textContent = 'Classifying... ' + Math.round(pct) + '% (' + (data.classified || 0) + ' of ' + (data.total || 0) + ')';
}

function showClassifyComplete(data) {
    const progress = document.getElementById('classifyProgress');
    if (progress) progress.classList.add('d-none');
    showReviewNotification('AI classification complete. ' + (data.classified || 0) + ' transactions classified.');
    setTimeout(() => location.reload(), 1500);
}

// ===== Confirmed Selection =====
function updateConfirmedSelection() {
    const checked = document.querySelectorAll('#confirmedTableBody .confirmed-checkbox:checked');
    const toolbar = document.getElementById('confirmedBulkToolbar');
    const count = document.getElementById('confirmedSelectedCount');
    const btn = document.getElementById('bulkUnconfirmBtn');
    if (checked.length > 0) {
        if (toolbar) toolbar.removeAttribute('style');
        if (count) count.textContent = checked.length + ' selected';
        if (btn) btn.disabled = false;
    } else {
        if (toolbar) toolbar.style.display = 'none !important';
        if (btn) btn.disabled = true;
    }
}

function toggleConfirmedSelectAll(master) {
    document.querySelectorAll('#confirmedTableBody .confirmed-checkbox').forEach(cb => {
        cb.checked = master.checked;
    });
    updateConfirmedSelection();
}

function bulkUnconfirmSelected() {
    const checked = document.querySelectorAll('#confirmedTableBody .confirmed-checkbox:checked');
    if (checked.length === 0) return;
    if (!confirm('Move ' + checked.length + ' transactions back to pending?')) return;
    checked.forEach(cb => {
        const url = cb.dataset.unconfirmUrl;
        if (url) {
            fetch(url, { method: 'POST', headers: { 'X-CSRFToken': CSRF_TOKEN, 'X-Requested-With': 'XMLHttpRequest' } })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    const row = document.getElementById('confirmed-row-' + cb.value);
                    if (row) row.remove();
                    _addRowToPendingTable(data);
                } else {
                    alert(data.error || 'Failed to unconfirm transaction.');
                }
            })
            .catch(err => {
                alert('Error: ' + err.message + '. Please refresh the page and try again.');
            });
        }
    });
}

// ===== COA Search in Pending Table =====
(function() {
    const searchTimers = {};
    document.addEventListener('input', function(e) {
        if (!e.target.classList.contains('review-coa-search')) return;
        const txnId = e.target.dataset.txnId;
        const query = e.target.value.trim();
        const resultsDiv = document.querySelector('.review-coa-results[data-txn-id="' + txnId + '"]');
        if (searchTimers[txnId]) clearTimeout(searchTimers[txnId]);
        if (query.length < 1) {
            if (resultsDiv) resultsDiv.innerHTML = '<div class="text-center text-muted py-2"><small>Type to search...</small></div>';
            return;
        }
        searchTimers[txnId] = setTimeout(function() {
            fetch(COA_SEARCH_URL + '?q=' + encodeURIComponent(query))
            .then(resp => resp.json())
            .then(data => {
                let html = '';
                if (data.items.length === 0) {
                    html = '<div class="text-center text-muted py-2"><small>No matching accounts.</small></div>';
                } else {
                    // Sort: accounts with TB balances first, then by absolute balance descending
                    var sorted = data.items.slice().sort(function(a, b) {
                        var aHas = a.tb_balance !== null && a.tb_balance !== undefined ? 1 : 0;
                        var bHas = b.tb_balance !== null && b.tb_balance !== undefined ? 1 : 0;
                        if (aHas !== bHas) return bHas - aHas;
                        if (aHas && bHas) return Math.abs(parseFloat(b.tb_balance)) - Math.abs(parseFloat(a.tb_balance));
                        return 0;
                    });
                    html = sorted.slice(0, 8).map(item => {
                        const tbBal = item.tb_balance !== null && item.tb_balance !== undefined
                            ? ' <span class="badge bg-secondary bg-opacity-25 text-dark" style="font-size:0.65rem; font-weight:600; font-family:monospace;">TB: $' + parseFloat(item.tb_balance).toLocaleString('en-AU', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</span>'
                            : ' <span class="badge bg-light text-muted" style="font-size:0.65rem;">TB: \u2014</span>';
                        const stmtType = item.stmt_type ? ' <span class="text-muted" style="font-size:0.65rem;">(' + item.stmt_type + ')</span>' : '';
                        return '<a href="#" class="dropdown-item small py-1 review-coa-option" ' +
                        'data-txn-id="' + txnId + '" ' +
                        'data-code="' + item.code + '" ' +
                        'data-name="' + item.name + '" ' +
                        'data-tax="' + (item.tax_code || '') + '">' +
                        '<strong>' + item.code + '</strong> \u2014 ' + item.name + stmtType +
                        tbBal +
                        '</a>';
                    }).join('');
                }
                if (resultsDiv) resultsDiv.innerHTML = html;
            });
        }, 200);
    });

    // Handle COA option selection
    document.addEventListener('click', function(e) {
        const opt = e.target.closest('.review-coa-option');
        if (!opt) return;
        e.preventDefault();
        const txnId = opt.dataset.txnId;
        const code = opt.dataset.code;
        const name = opt.dataset.name;
        const tax = opt.dataset.tax || '';

        // Update the button text
        const btn = document.querySelector('.review-coa-btn[data-txn-id="' + txnId + '"]');
        if (btn) btn.textContent = name;

        // Update the code display
        const row = document.getElementById('pending-row-' + txnId);
        if (row) {
            const codeEl = row.querySelector('.review-ai-code');
            if (codeEl) codeEl.textContent = code;
            row.dataset.code = code;
        }

        // Update hidden form fields
        const form = document.querySelector('.review-approve-form[data-txn-id="' + txnId + '"]');
        if (form) {
            const codeInput = form.querySelector('.review-code-input');
            const nameInput = form.querySelector('.review-name-input');
            const taxInput = form.querySelector('.review-tax-input');
            if (codeInput) codeInput.value = code;
            if (nameInput) nameInput.value = name;
            if (taxInput) taxInput.value = tax;
        }

        // Close the dropdown
        const bsDropdown = bootstrap.Dropdown.getInstance(btn);
        if (bsDropdown) bsDropdown.hide();

        // Auto-set GST treatment based on the account's tax code
        if (IS_GST_REGISTERED && tax) _applyGstTreatmentForAccount(txnId, tax);

        // Re-run apportionment detection with new account code
        if (IS_GST_REGISTERED) detectApportionmentForRow(txnId);
    });
})();

// ===== Auto-set GST treatment from account tax code =====
function _taxCodeToGstTreatment(taxCode) {
    // Map EntityChartOfAccount.tax_code to the GST treatment select value
    const code = (taxCode || '').toUpperCase().trim();
    const map = {
        'GST': 'gst', 'INP': 'gst', 'CAP': 'gst', 'GNR': 'gst', 'ADS': 'gst',
        'FRE': 'gst_free', 'FOA': 'gst_free',
        'ITS': 'input_taxed', 'IOA': 'input_taxed',
        'N-T': 'out_of_scope',
    };
    return map[code] || '';
}

function _applyGstTreatmentForAccount(txnId, taxCode) {
    // Auto-set the GST treatment dropdown when an account is assigned
    const treatment = _taxCodeToGstTreatment(taxCode);
    if (!treatment) return;
    const select = document.querySelector('.gst-treatment-select[data-txn-id="' + txnId + '"]');
    if (select && select.value !== treatment) {
        select.value = treatment;
        updateGstTreatment(select);
    }
}

// ===== Bank Account Mapping Functions =====
function toggleBankMappingForm() {
    const form = document.getElementById('bankMappingForm');
    if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function saveBankMapping(e) {
    e.preventDefault();
    const form = e.target;
    const data = {
        bank_account_name: form.bank_account_name.value,
        bsb: form.bsb.value,
        account_number: form.account_number.value,
        tb_account_code: form.tb_account_code.value,
        tb_account_name: form.tb_account_name.value,
        is_default: form.is_default.checked,
    };
    fetch(BANK_MAPPING_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': CSRF_TOKEN,
            'X-Requested-With': 'XMLHttpRequest',
        },
        body: JSON.stringify(data),
    })
    .then(r => r.json())
    .then(resp => {
        if (resp.status === 'ok') {
            // Update the banner to show the saved mapping
            const card = document.getElementById('bankMappingCard');
            if (card) {
                card.className = card.className.replace('border-warning', 'border-success');
                // Reload to reflect the new mapping
                location.reload();
            }
        } else {
            alert(resp.message || 'Error saving bank mapping.');
        }
    })
    .catch(() => alert('Network error saving bank mapping.'));
}

function recalcBankContra() {
    const btn = document.getElementById('recalcBankContraBtn');
    if (!btn) return;
    const origHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Recalculating...';
    fetch(RECALC_BANK_CONTRA_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': CSRF_TOKEN,
            'X-Requested-With': 'XMLHttpRequest',
        },
        body: '{}',
    })
    .then(r => r.json())
    .then(resp => {
        btn.disabled = false;
        btn.innerHTML = origHTML;
        if (resp.status === 'ok') {
            // Show success message
            const card = document.getElementById('bankMappingCard');
            if (card) {
                const alert = document.createElement('div');
                alert.className = 'alert alert-success alert-dismissible fade show mt-2 mb-0 py-1 px-2';
                alert.style.fontSize = '0.85rem';
                alert.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i>' + resp.message +
                    '<button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>';
                card.querySelector('.card-body').appendChild(alert);
            }
        } else {
            alert(resp.message || 'Error recalculating bank contra entries.');
        }
    })
    .catch(() => {
        btn.disabled = false;
        btn.innerHTML = origHTML;
        alert('Network error recalculating bank contra entries.');
    });
}
