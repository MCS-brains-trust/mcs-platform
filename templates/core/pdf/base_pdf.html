<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 2.5cm 2cm 2.5cm 2cm;
    @bottom-center {
      content: "{{ firm_name|default:'StatementHub' }} — Confidential";
      font-size: 8pt;
      color: #999;
    }
    @bottom-right {
      content: counter(page) " of " counter(pages);
      font-size: 8pt;
      color: #999;
    }
  }
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 10.5pt;
    color: #1a1a1a;
    line-height: 1.5;
  }
  .header {
    border-bottom: 2px solid #1a3a5c;
    padding-bottom: 10px;
    margin-bottom: 24px;
  }
  .header .firm-name {
    font-size: 14pt;
    font-weight: bold;
    color: #1a3a5c;
  }
  .header .doc-title {
    font-size: 13pt;
    font-weight: bold;
    margin-top: 4px;
  }
  .meta-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    font-size: 9.5pt;
  }
  .meta-table td {
    padding: 4px 8px;
    border: 1px solid #ddd;
  }
  .meta-table td:first-child {
    font-weight: bold;
    background: #f5f7fa;
    width: 35%;
  }
  h2 {
    font-size: 11pt;
    color: #1a3a5c;
    border-bottom: 1px solid #ccc;
    padding-bottom: 4px;
    margin-top: 20px;
  }
  p { margin: 6px 0; }
  .signature-block {
    margin-top: 30px;
    page-break-inside: avoid;
  }
  .signature-line {
    border-top: 1px solid #333;
    width: 60%;
    margin-top: 40px;
    margin-bottom: 4px;
  }
  .disclaimer {
    margin-top: 30px;
    padding: 10px;
    background: #f9f9f9;
    border-left: 3px solid #ccc;
    font-size: 8.5pt;
    color: #666;
  }
  ul { margin: 6px 0; padding-left: 20px; }
  li { margin-bottom: 4px; }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
