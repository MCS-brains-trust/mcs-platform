{% extends "base.html" %}
{% block title %}Division 7A — Not Applicable — StatementHub{% endblock %}
{% block content %}
<div class="container-fluid py-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'core:entity_list' %}">Entities</a></li>
            <li class="breadcrumb-item"><a href="{% url 'core:entity_detail' pk=entity.pk %}">{{ entity.entity_name }}</a></li>
            <li class="breadcrumb-item"><a href="{% url 'core:financial_year_detail' pk=financial_year.pk %}">{{ financial_year }}</a></li>
            <li class="breadcrumb-item active">Division 7A</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <i class="bi bi-info-circle display-4 text-muted"></i>
            <h5 class="mt-3">Division 7A Assessment Not Applicable</h5>
            <p class="text-muted">{{ reason }}</p>
            <a href="{% url 'core:financial_year_detail' pk=financial_year.pk %}" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Back to Financial Year
            </a>
        </div>
    </div>
</div>
{% endblock %}
