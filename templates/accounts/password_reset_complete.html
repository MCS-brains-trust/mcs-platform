{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - StatementHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .reset-card {
            max-width: 460px;
            margin: 80px auto;
        }
        .brand-header {
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            color: white;
            padding: 2rem;
            text-align: center;
            border-radius: 0.5rem 0.5rem 0 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reset-card">
            <div class="card shadow">
                <div class="brand-header">
                    <h3 class="mb-1"><i class="bi bi-file-earmark-bar-graph"></i> StatementHub</h3>
                    <p class="mb-0 opacity-75">{{ firm_name }}</p>
                </div>
                <div class="card-body p-4 text-center">
                    <div class="mb-3">
                        <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
                    </div>
                    <h5 class="mb-3">Password Reset Complete</h5>
                    <p class="text-muted">Your password has been set successfully. You can now log in with your new password.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-box-arrow-in-right"></i> Go to Login
                    </a>
                </div>
                <div class="card-footer text-center text-muted small">
                    &copy; {% now "Y" %} {{ firm_name }}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
